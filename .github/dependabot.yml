version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    groups:
      cargo-patch:
        update-types: [patch]
      cargo-minor:
        update-types: [minor]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Chicago"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
      include: scope
