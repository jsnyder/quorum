id: block-on-in-async
language: Rust
severity: warning
message: "Calling `block_on` inside an async context can panic or deadlock the runtime. Use `.await` instead."
note: "Feedback: ~3 confirmed true positives"
rule:
  pattern: $RUNTIME.block_on($$$ARGS)
  inside:
    kind: function_item
    regex: '^\s*(pub\s+)?async\s+(unsafe\s+)?fn'
    stopBy: end
