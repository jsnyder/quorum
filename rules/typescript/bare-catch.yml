id: bare-catch
language: TypeScript
severity: warning
message: Empty catch block silently swallows errors. Log the error, handle it, or rethrow.
note: "Feedback: 19 confirmed true positives"
rule:
  kind: catch_clause
  has:
    kind: statement_block
    not:
      has:
        any:
          - kind: expression_statement
          - kind: throw_statement
          - kind: return_statement
          - kind: variable_declaration
          - kind: if_statement
