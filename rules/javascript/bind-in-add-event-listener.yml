id: bind-in-add-event-listener
language: JavaScript
severity: warning
message: "`.bind()` inside `addEventListener` creates a new function each call -- the listener can never be removed with `removeEventListener`."
note: "Feedback: 4+ confirmed true positives"
rule:
  kind: call_expression
  all:
    - has:
        field: function
        kind: member_expression
        has:
          field: property
          regex: "^addEventListener$"
        stopBy: end
    - has:
        kind: arguments
        has:
          kind: call_expression
          has:
            field: function
            kind: member_expression
            has:
              field: property
              regex: "^bind$"
            stopBy: end
          stopBy: end
        stopBy: end
